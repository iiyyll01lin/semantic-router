# =============================================================================
# Client/edge LLM Gateway config for the 2-box Strix Halo PoC.
#
# This is the gateway config that runs on Halo-A (the CLIENT/EDGE box). It is
# derived from ../strix-halo-poc/poc-strix.yaml and keeps the SAME routing
# (decisions, modelCards, signals), global, semantic_cache, security, and
# observability blocks. The ONLY thing that changes is the backend wiring so
# routing splits across the two boxes:
#
#   EDGE / LOCAL tiers (served by the local Ollama on Halo-A, 0 network hops):
#     - qwen/qwen3.5-rocm          (provider_model_id llama3.2:3b)  -> ollama:11434
#     - google/gemini-2.5-flash-lite (provider_model_id qwen2.5:7b) -> ollama:11434
#
#   DATACENTER tiers (served by the remote Ollama on Halo-B, 1 network hop):
#     - google/gemini-3.1-pro      (provider_model_id qwen2.5:14b)  -> HALO_B_IP:11434
#     - openai/gpt5.4              (provider_model_id qwen3:14b)     -> HALO_B_IP:11434
#
#   FRONTIER / PREMIUM tier (real external Anthropic public API, NOT a local mock):
#     - anthropic/claude-opus-4.6  (provider_model_id claude-opus-4-20250514) -> https://api.anthropic.com
#       Requires ANTHROPIC_API_KEY on Halo-A and outbound HTTPS egress to api.anthropic.com:443.
#     - amd/claude-opus-4.8        (provider_model_id Claude-Opus-4.8)         -> https://llm-api.amd.com/Anthropic
#       AMD Anthropic-compatible gateway (Azure APIM). Auth via the
#       Ocp-Apim-Subscription-Key header, rendered from the AMD_OCP_APIM_KEY env
#       var at serve time (placeholder committed; the rendered copy is gitignored).
#       Requires outbound HTTPS egress from Halo-A to llm-api.amd.com:443.
#
# IMPORTANT: `HALO_B_IP` is a literal placeholder, NOT a resolvable host. The
# docker-network DNS name `ollama` only resolves on the box that runs that
# container, so remote backends MUST use a routable IP/host. Substitute the real
# Halo-B address before serving. client-bring-up.sh does this automatically by
# rendering a runtime copy with the HALO_B_IP env var (sed substitution); if you
# serve this file by hand, replace every `HALO_B_IP` with the real IP first.
# See README.md (NETWORKING) for ports/firewall requirements.
# =============================================================================
version: v0.3
listeners:
    - name: http-8899
      address: 0.0.0.0
      port: 8899
      timeout: 1200s
providers:
    defaults:
        default_model: qwen/qwen3.5-rocm
        reasoning_families:
            qwen3:
                type: chat_template_kwargs
                parameter: enable_thinking
        default_reasoning_effort: low
    models:
        - name: anthropic/claude-opus-4.6
          api_format: anthropic
          reasoning_family: qwen3
          provider_model_id: ANTHROPIC_MODEL_ID
          backend_refs:
            # FRONTIER tier: real external Anthropic public API (no local hop).
            # Uses the shared anthropic_api_cluster (api.anthropic.com:443 + TLS).
            - name: anthropic
              base_url: https://api.anthropic.com
              provider: anthropic
              type: anthropic
              api_key_env: ANTHROPIC_API_KEY
              weight: 1
          pricing:
            currency: USD
            prompt_per_1m: 1.8
            completion_per_1m: 7.2
            cached_input_per_1m: 0.45
          external_model_ids:
            anthropic: ANTHROPIC_MODEL_ID
        - name: amd/claude-opus-4.8
          api_format: anthropic
          reasoning_family: qwen3
          provider_model_id: Claude-Opus-4.8
          backend_refs:
            # FRONTIER tier via AMD's Anthropic-compatible gateway (Azure APIM).
            # Body is Anthropic Messages format; ResolveChatPath yields
            # /Anthropic/v1/messages from base_url. The anthropic client sends
            # anthropic-version: 2023-06-01 by default (matches the AMD curl).
            # Auth is the Ocp-Apim-Subscription-Key header (NOT x-api-key),
            # rendered from the AMD_OCP_APIM_KEY env var at serve time
            # (placeholder committed; the rendered copy is gitignored). No
            # api_key_env on purpose: with no Anthropic credential the router
            # omits the hardcoded x-api-key header, so only the AMD subscription
            # header is sent.
            - name: amd_anthropic
              base_url: https://llm-api.amd.com/Anthropic
              provider: anthropic
              type: anthropic
              extra_headers:
                Ocp-Apim-Subscription-Key: __AMD_OCP_APIM_KEY__
              weight: 1
          pricing:
            currency: USD
            prompt_per_1m: 1.8
            completion_per_1m: 7.2
            cached_input_per_1m: 0.45
          external_model_ids:
            anthropic: Claude-Opus-4.8
        - name: google/gemini-2.5-flash-lite
          reasoning_family: qwen3
          provider_model_id: qwen2.5:7b
          backend_refs:
            - name: ollama_local
              endpoint: ollama:11434
              protocol: http
              weight: 1
          pricing:
            currency: USD
            prompt_per_1m: 0.01
            completion_per_1m: 0.04
            cached_input_per_1m: 0.002
          external_model_ids:
            vllm: qwen2.5:7b
        - name: google/gemini-3.1-pro
          reasoning_family: qwen3
          provider_model_id: qwen2.5:14b
          backend_refs:
            # DATACENTER tier: served by the remote Ollama on Halo-B (1 hop).
            # HALO_B_IP is a placeholder; substitute the real Halo-B IP/host.
            - name: ollama_local
              endpoint: HALO_B_IP:11434
              protocol: http
              weight: 1
          pricing:
            currency: USD
            prompt_per_1m: 0.48
            completion_per_1m: 1.92
            cached_input_per_1m: 0.12
          external_model_ids:
            vllm: qwen2.5:14b
        - name: openai/gpt5.4
          reasoning_family: qwen3
          provider_model_id: qwen3:14b
          backend_refs:
            # DATACENTER tier: served by the remote Ollama on Halo-B (1 hop).
            # HALO_B_IP is a placeholder; substitute the real Halo-B IP/host.
            - name: ollama_local
              endpoint: HALO_B_IP:11434
              protocol: http
              weight: 1
          pricing:
            currency: USD
            prompt_per_1m: 1.2
            completion_per_1m: 4.8
            cached_input_per_1m: 0.3
          external_model_ids:
            vllm: qwen3:14b
        - name: qwen/qwen3.5-rocm
          reasoning_family: qwen3
          provider_model_id: llama3.2:3b
          backend_refs:
            - name: ollama_local
              endpoint: ollama:11434
              protocol: http
              weight: 1
          pricing:
            currency: USD
          external_model_ids:
            vllm: llama3.2:3b
routing:
    modelCards:
        - name: anthropic/claude-opus-4.6
          context_window_size: 262144
          description: PREMIUM tier alias reserved for legal and high-risk analysis.
          capabilities:
            - legal_analysis
            - policy_review
            - high_risk_review
          quality_score: 0.94
          modality: text
          tags:
            - tier:premium
            - cost:highest
            - specialty:legal
        - name: amd/claude-opus-4.8
          context_window_size: 262144
          description: PREMIUM tier via AMD's Anthropic-compatible gateway (Claude Opus 4.8).
          capabilities:
            - legal_analysis
            - policy_review
            - high_risk_review
          quality_score: 0.95
          modality: text
          tags:
            - tier:premium
            - cost:highest
            - specialty:legal
            - provider:amd
        - name: google/gemini-2.5-flash-lite
          context_window_size: 262144
          description: MEDIUM tier alias for low-cost verified explanation and correction tasks.
          capabilities:
            - verified_explanation
            - source_backed_correction
            - nuanced_explanation
          quality_score: 0.68
          modality: text
          tags:
            - tier:medium
            - cost:low
            - specialty:verified
        - name: google/gemini-3.1-pro
          context_window_size: 262144
          description: COMPLEX tier alias for systems design, hard STEM, health guidance, and deep general reasoning.
          capabilities:
            - architecture
            - stem_analysis
            - long_context
            - general_reasoning
          quality_score: 0.82
          modality: text
          tags:
            - tier:complex
            - cost:upper_mid
            - specialty:complex_generalist
        - name: openai/gpt5.4
          context_window_size: 262144
          description: REASONING tier alias for narrow formal math proofs and derivations.
          capabilities:
            - reasoning
            - proofs
            - formal_derivation
          quality_score: 0.9
          modality: text
          tags:
            - tier:reasoning
            - cost:high
            - specialty:formal_proof
        - name: qwen/qwen3.5-rocm
          context_window_size: 262144
          description: SIMPLE tier alias and free self-hosted default for fast QA, broad fallback, creative drafting, and most low-cost traffic.
          capabilities:
            - fast_qa
            - self_hosted
            - concise_answers
            - general_chat
            - creative_drafting
          quality_score: 0.58
          modality: text
          tags:
            - tier:simple
            - cost:free
            - deployment:self_hosted
            - traffic:default
