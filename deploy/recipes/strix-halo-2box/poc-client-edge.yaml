    decisions:
        - name: security_guard
          description: Deny or down-route requests that trip jailbreak or PII signals.
          priority: 300
          rules:
            operator: OR
            conditions:
                - type: jailbreak
                  name: jailbreak_attempt
                - type: pii
                  name: contains_pii
                - type: keyword
                  name: sensitive_pii_markers
                - type: keyword
                  name: jailbreak_markers
          modelRefs:
            - model: qwen/qwen3.5-rocm
              use_reasoning: false
          plugins:
            - type: fast_response
              configuration:
                message: This request was blocked by the security guard because it tripped a PII or jailbreak signal. Remove sensitive personal data and any prompt-injection content, then try again.
            - type: response_jailbreak
              configuration:
                action: block
                enabled: true
                threshold: 0.7
        - name: premium_legal
          description: Premium-only route for high-value legal and compliance analysis.
          priority: 260
          tier: 1
          rules:
            operator: AND
            conditions:
                - operator: OR
                  conditions:
                    - type: domain
                      name: law
                    - type: keyword
                      name: legal_risk_markers
                    - type: embedding
                      name: premium_legal_analysis
                - operator: OR
                  conditions:
                    - type: embedding
                      name: premium_legal_analysis
                    - type: projection
                      name: verification_required
                    - type: complexity
                      name: legal_risk:medium
                    - type: complexity
                      name: legal_risk:hard
