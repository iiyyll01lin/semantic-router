global:
    router:
        config_source: file
        auto_model_name: MoM
        include_config_models_in_list: false
        clear_route_cache: true
        streamed_body:
            enabled: false
        skip_processing:
            enabled: false
        model_selection:
            method: session_aware
            enabled: true
            router_dc:
                temperature: 0.07
                dimension_size: 768
                min_similarity: 0.3
                use_query_contrastive: true
                use_model_contrastive: true
                require_descriptions: false
                use_capabilities: true
            hybrid:
                elo_weight: 0.3
                router_dc_weight: 0.3
                automix_weight: 0.2
                cost_weight: 0.2
                quality_gap_threshold: 0.1
                normalize_scores: true
            session_aware:
                base_method: knn
                tool_loop_hard_lock: true
                context_portability_hard_lock: true
    services:
        api:
            batch_classification: {}
        response_api:
            enabled: true
            store_backend: redis
            ttl_seconds: 86400
            max_responses: 1000
        observability:
            tracing:
                enabled: true
                provider: opentelemetry
                exporter:
                    type: otlp
                    endpoint: vllm-sr-jaeger:4317
                    insecure: true
                sampling:
                    type: always_on
                    rate: 1
                resource:
                    service_name: vllm-sr
                    service_version: v0.3.0
                    deployment_environment: development
            metrics:
                enabled: true
                windowed_metrics:
                    enabled: false
                    model_metrics: false
                    queue_depth_estimation: false
        authz: {}
        ratelimit: {}
        router_replay:
            enabled: true
            store_backend: postgres
            ttl_seconds: 2592000
        startup_status:
            store_backend: file
    stores:
        semantic_cache:
            backend_type: memory
            enabled: true
            max_entries: 1000
            ttl_seconds: 3600
            eviction_policy: fifo
        memory:
            milvus:
                address: ""
                collection: agentic_memory
                dimension: 384
            extraction_batch_size: 10
            default_retrieval_limit: 5
            default_similarity_threshold: 0.7
    integrations:
        tools:
            enabled: false
            top_k: 3
            tools_db_path: config/tools_db.json
            fallback_to_empty: true
        looper:
            endpoint: http://localhost:8899/v1/chat/completions
            timeout_seconds: 1200
    model_catalog:
        embeddings:
            semantic:
                qwen3_model_path: ""
                gemma_model_path: ""
                mmbert_model_path: models/mmbert-embed-32k-2d-matryoshka
                bert_model_path: ""
                use_cpu: true
                embedding_config:
                    model_type: mmbert
                    preload_embeddings: true
                    target_dimension: 768
                    target_layer: 22
                    enable_soft_matching: true
                    top_k: 1
                    min_score_threshold: 0.5
        system:
            prompt_guard: models/mmbert32k-jailbreak-detector-merged
            domain_classifier: models/mmbert32k-intent-classifier-merged
            pii_classifier: models/pii_classifier_modernbert-base_presidio_token_model
            fact_check_classifier: models/mmbert32k-factcheck-classifier-merged
            hallucination_detector: models/mom-halugate-detector
            hallucination_explainer: models/mom-halugate-explainer
            feedback_detector: models/mmbert32k-feedback-detector-merged
        kbs:
            - name: privacy_kb
              source:
                path: knowledge_bases/privacy/
                manifest: labels.json
              threshold: 0.55
              label_thresholds:
                prompt_injection: 0.7
              groups:
                frontier_reasoning:
                    - architecture_analysis
                    - root_cause_analysis
                    - multi_step_tradeoffs
                local_standard:
                    - generic_coding
                    - simple_task
                    - general_knowledge
                privacy_policy:
                    - proprietary_code
                    - internal_document
                    - pii
                    - business_strategy
                    - trade_secret_ip
                    - operational_infrastructure
                    - locality_directive
                    - customer_data
                private:
                    - prompt_injection
                    - credential_exfiltration
                    - jailbreak_role
                    - system_prompt_extraction
                    - proprietary_code
                    - internal_document
                    - pii
                    - business_strategy
                    - trade_secret_ip
                    - operational_infrastructure
                    - locality_directive
                    - customer_data
                public:
                    - architecture_analysis
                    - root_cause_analysis
                    - multi_step_tradeoffs
                    - generic_coding
                    - simple_task
                    - general_knowledge
                security_containment:
                    - prompt_injection
                    - credential_exfiltration
                    - jailbreak_role
                    - system_prompt_extraction
              metrics:
                - name: private_vs_public
                  type: group_margin
                  positive_group: private
                  negative_group: public
            - name: mmlu_kb
              source:
                path: knowledge_bases/mmlu/
                manifest: labels.json
              threshold: 0.25
              groups:
                escalate:
                    - biology
                    - business
                    - computer science
                    - economics
                    - history
                    - math
                    - other
                    - philosophy
                    - psychology
                keep:
                    - chemistry
                    - engineering
